<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 3 - Contexte de l'histoire</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Styles spécifiques pour cette slide */
        .slide-container h1 {
            color: #d4af37;
            font-size: 2.2em;
            margin-bottom: 20px;
        }

        .slide-container p {
            color: #d4af37;
            font-size: 1.3em;
            text-align: center;
            margin: 10px auto;
            max-width: 90%;
        }

        .equipment-images {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px auto;
        }

        .equipment-images img {
            width: 200px;
            height: 150px;
            object-fit: contain;
            border: 2px solid #d4af37;
            border-radius: 10px;
            background-color: rgba(89, 61, 31, 0.3);
            padding: 5px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <h1>Le contexte</h1>
        <p>
            Lors de ta dernière chasse, un terrible tigre à dents de sabre a décimé ton groupe.<br>
            Tu décides de partir à la recherche d'une nouvelle tribu...
        </p>
        <div class="equipment-images">
            <img src="images/equipement.jpg" alt="Lance cassée">
            <img src="images/silex.jpg" alt="Silex non taillé">
        </div>
        <p>Tu es équipé d'une <strong>lance cassée</strong> et d'un <strong>silex non taillé</strong>.</p>
        <div style="margin-top: 20px;">
            <button class="nav-button" onclick="window.location.href='slide2.html'">
                Précédent
            </button>
            <button class="nav-button" onclick="window.location.href='slide4.html'">
                Suivant
            </button>
        </div>
    </div>
</body>
</html>
