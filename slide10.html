<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 10 - Une fumée au loin</title>
    <style>
        body {
            background-color: #222;
            color: #d4af37;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .criteria-bar {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgba(89, 61, 31, 0.5);
            border-radius: 10px;
            border: 1px solid #d4af37;
            padding: 5px;
            z-index: 100;
        }

        .criteria-item-top {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #d4af37;
            font-size: 0.9em;
            margin: 0 10px;
        }

        .criteria-icon-top {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid #d4af37;
            overflow: hidden;
            background-color: rgba(89, 61, 31, 0.3);
        }

        .criteria-icon-top img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .slide-container {
            text-align: center;
            padding: 20px;
            padding-top: 100px;
        }

        .slide-image {
            max-width: 300px; /* Réduction de la taille de l'image */
            height: auto;
            margin: 20px auto;
            display: block;
            border: 2px solid #d4af37;
            border-radius: 10px;
            background-color: rgba(89, 61, 31, 0.3);
            padding: 10px;
        }

        .choice-button {
            background-color: #5a3d1f;
            border: 2px solid #d4af37;
            color: #d4af37;
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px auto;
            font-weight: bold;
            display: block;
            width: 80%;
            max-width: 400px;
        }

        .choice-button:hover {
            background-color: #d4af37;
            color: #121212;
        }

        #result {
            display: none;
            text-align: center;
            margin: 20px auto;
            font-size: 1.2em;
        }

        #game-over-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 200;
        }

        #game-over-text {
            color: #d4af37;
            font-size: 3em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            margin-bottom: 20px;
        }

        #game-over-image {
            max-width: 300px;
            margin: 20px auto;
            display: block;
            border: 2px solid #d4af37;
            border-radius: 10px;
            background-color: rgba(89, 61, 31, 0.3);
            padding: 10px;
        }

        .restart-button {
            background-color: #5a3d1f;
            border: 2px solid #d4af37;
            color: #d4af37;
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px auto;
            font-weight: bold;
            display: block;
        }
    </style>
</head>
<body>
    <div class="criteria-bar">
        <div class="criteria-item-top">
            <div class="criteria-icon-top">
                <img src="images/force.jpg" alt="Force">
            </div>
            <span class="score" id="forceScore">2</span>
        </div>
        <div class="criteria-item-top">
            <div class="criteria-icon-top">
                <img src="images/faim.jpg" alt="Faim">
            </div>
            <span class="score" id="faimScore">2</span>
        </div>
        <div class="criteria-item-top">
            <div class="criteria-icon-top">
                <img src="images/intelligence.jpg" alt="Intelligence">
            </div>
            <span class="score" id="intelligenceScore">0</span>
        </div>
        <div class="criteria-item-top">
            <div class="criteria-icon-top">
                <img src="images/vitalite.jpg" alt="Vitalité">
            </div>
            <span class="score" id="vitaliteScore">2</span>
        </div>
        <!-- Icône pour le feu -->
        <div class="criteria-item-top" id="fireItem" style="display: none;">
            <div class="criteria-icon-top">
                <img src="images/feu.jpg" alt="Feu">
            </div>
        </div>
        <!-- Icône pour la lance réparée -->
        <div class="criteria-item-top" id="lanceItem" style="display: none;">
            <div class="criteria-icon-top">
                <img src="images/lance_reparee.jpg" alt="Lance Réparée">
            </div>
        </div>
        <!-- Icône pour la peau de tigre -->
        <div class="criteria-item-top" id="peauTigreItem" style="display: none;">
            <div class="criteria-icon-top">
                <img src="images/peau_tigre.jpg" alt="Peau de Tigre">
            </div>
        </div>
    </div>

    <div class="slide-container">
        <h1>Fatigué par votre combat, vous apercevez au loin une fumée...</h1>
        <p>Il vous faut pour la rejoindre traverser une rivière agitée mais peu profonde...</p>
        <img class="slide-image" src="images/fumee_riviere.jpg" alt="Fumée au loin">
        <button class="choice-button" onclick="makeChoice(1)">
            Vous la traversez.
        </button>
        <button class="choice-button" onclick="makeChoice(2)">
            Vous faites le tour sans la traverser.
        </button>
        <div id="result"></div>
    </div>

    <div id="game-over-container">
        <div id="game-over-text">Tu es mort !!!</div>
        <img id="game-over-image" src="images/mort_personnage.jpg" alt="Game Over">
        <button class="restart-button" onclick="window.location.href='slide4.html'">
            Recommencer
        </button>
    </div>

    <script>
        // Récupère les scores, l'état du feu, de la lance et de la peau de tigre depuis l'URL
        const urlParams = new URLSearchParams(window.location.search);
        let force = parseInt(urlParams.get('force')) || 2;
        let faim = parseInt(urlParams.get('faim')) || 2;
        let intelligence = parseInt(urlParams.get('intelligence')) || 0;
        let vitalite = parseInt(urlParams.get('vitalite')) || 2;

        // Met à jour les scores affichés
        document.getElementById("forceScore").textContent = force;
        document.getElementById("faimScore").textContent = faim;
        document.getElementById("intelligenceScore").textContent = intelligence;
        document.getElementById("vitaliteScore").textContent = vitalite;

        // Vérifie si le joueur a le feu
        if (urlParams.get('feu') === 'true') {
            document.getElementById("fireItem").style.display = "flex";
        }

        // Vérifie si le joueur a la lance réparée
        if (urlParams.get('lance') === 'true') {
            document.getElementById("lanceItem").style.display = "flex";
        }

        // Vérifie si le joueur a la peau de tigre
        if (urlParams.get('peauTigre') === 'true') {
            document.getElementById("peauTigreItem").style.display = "flex";
        }

        // Vérifie le Game Over au chargement de la page
        checkGameOver(force, faim, vitalite);

        function makeChoice(choice) {
            const resultDiv = document.getElementById("result");
            const buttons = document.querySelectorAll('.choice-button');

            // Cache les boutons
            buttons.forEach(button => button.style.display = 'none');

            // Affiche le résultat
            resultDiv.style.display = "block";

            // Met à jour les scores selon le choix
            let feu = urlParams.get('feu') === 'true';
            let lance = urlParams.get('lance') === 'true';
            let peauTigre = urlParams.get('peauTigre') === 'true';

            if (choice === 1) {
                resultDiv.innerHTML = "<p>Cela vous fatigue beaucoup. Vous perdez 2 jetons force, 2 jetons vitalité et deux jetons nourriture.</p>";
                force -= 2;
                vitalite -= 2;
                faim -= 2;
            } else if (choice === 2) {
                resultDiv.innerHTML = "<p>Vous trouvez un passage plus à sec. Vous perdez 1 jeton vitalité.</p>";
                vitalite -= 1;
            }

            // Met à jour les scores affichés
            document.getElementById("forceScore").textContent = force;
            document.getElementById("vitaliteScore").textContent = vitalite;
            document.getElementById("faimScore").textContent = faim;

            // Vérifie le Game Over
            checkGameOver(force, faim, vitalite);

            // Affiche un bouton pour continuer avec les scores dans l'URL
            if (force > 0 && faim > 0 && vitalite > 0) {
                resultDiv.innerHTML += `<button class="choice-button" onclick="window.location.href='slide11.html?force=${force}&faim=${faim}&intelligence=${intelligence}&vitalite=${vitalite}&feu=${feu}&lance=${lance}&peauTigre=${peauTigre}'">Continuer</button>`;
            }
        }

        function checkGameOver(force, faim, vitalite) {
            if (force <= 0 || faim <= 0 || vitalite <= 0) {
                document.getElementById("game-over-container").style.display = "flex";
            }
        }
    </script>
</body>
</html>
