<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 2 - Critères du jeu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="slide-container">
        <h1>Quatre critères à gérer !</h1>
        <h2>Pour réussir ton aventure, tu devras faire attention à :</h2>
        <ul class="criteria-list">
            <li class="criteria-item">
                <div class="criteria-icon">
                    <img src="images/force.jpg" alt="Force">
                </div>
                <strong>Force</strong>
            </li>
            <li class="criteria-item">
                <div class="criteria-icon">
                    <img src="images/faim.jpg" alt="Faim">
                </div>
                <strong>Faim</strong>
            </li>
            <li class="criteria-item">
                <div class="criteria-icon">
                    <img src="images/intelligence.jpg" alt="Intelligence">
                </div>
                <strong>Intelligence</strong>
            </li>
            <li class="criteria-item">
                <div class="criteria-icon">
                    <img src="images/vitalite.jpg" alt="Vitalité">
                </div>
                <strong>Vitalité</strong>
            </li>
        </ul>
        <h3>Tu démarres avec 2 jetons force, faim et vitalité. Si un de ces critères tombe à 0, ton héros meurt. Tu n'as aucune intelligence en commençant.</h3>
        <div style="margin-top: 20px;">
            <button class="nav-button" onclick="window.location.href='slide1.html'">
                Précédent
            </button>
            <button class="nav-button" onclick="window.location.href='slide3.html'">
                Suivant
            </button>
        </div>
    </div>
</body>
</html>
